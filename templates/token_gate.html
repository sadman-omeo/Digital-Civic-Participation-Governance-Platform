<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Token Generation</title>
    <style>
        .container { margin: 50px auto; max-width: 400px; text-align: center; font-family: sans-serif; }
        .token-box { 
            width: 100%; padding: 15px; margin-bottom: 10px; 
            border: 2px dashed #ccc; background: #f9f9f9; 
            font-family: monospace; font-size: 1.1em;
        }
        .btn { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #d9534f; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Generate Voting Token</h2>
    
    <div class="token-box">
        {% if active_token %}
            {{ active_token.token }}
        {% else %}
            [ No Active Token ]
        {% endif %}
    </div>

    <form action="/token/generate_token"method="POST">
        {% if active_token %}
            <button type="submit" class="btn" disabled title="Wait until current token expires">Generate</button>
            <p class="error">Active token exists. Please wait until it expires to generate a new one.</p>
            <p><small>Expires at: {{ expired.strftime('%H:%M:%S') }} Bangladeshi Time</small></p>
        {% else %}
            <button type="submit" class="btn">Generate</button>
        {% endif %}
    </form>
</div>

</body>
</html>
