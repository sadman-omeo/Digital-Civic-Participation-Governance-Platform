{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h3 class="mb-4">Choose an Election</h3>

            {% if elections %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Available Elections</label>
                        <select name="election_id" class="form-select" required>
                            <option value="">Select an election</option>
                            {% for election in elections %}
                            <!-- JESIA AUTO LOCK -->

                                <!-- <option value="{{ election.id }}">
                                    {{ election.title }} | Deadline: {{ election.deadline }}
                                </option> -->
                                <option value="{{ election.id }}">
                                    {{ election.title }} | Deadline: {{ election.deadline }}
                                    {% if election.id in locked_election_ids %} | LOCKED{% endif %}
                                </option>

                                <!-- JESIA AUTO LOCK -->
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Jesia auto lock -->
                    <p class="text-muted small">
                        Elections marked as <strong>LOCKED</strong> are closed and cannot be voted on.
                    </p>
                    <!-- Jesia auto lock -->

                    <button type="submit" class="btn btn-primary">
                        Continue to Token Page
                    </button>
                </form>
            {% else %}
                <div class="alert alert-warning mb-0">
                    No active elections are available.
                </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
