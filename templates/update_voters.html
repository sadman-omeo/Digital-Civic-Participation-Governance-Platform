<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Blue Theme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card">
                    <h2 class="text-center mb-4">Update Voter</h2>
                    <form action="/admin/voter/{{ voter.NID }}/edit" method="POST">
                        <div class="mb-3">
                            <label class="form-label">NID</label>
                            <input type="text" class="form-control" name="nid" value="{{ voter.NID }}"  required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" name="name" value="{{voter.Name}}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{voter.Email}}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" name="phone" value="{{voter.Phone}}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-control" name="role" required> <!-- changed -->
                                <option value="voter" {% if voter.role == "voter" %}selected{% endif %}>Citizen</option> <!-- changed -->
                                <option value="admin" {% if voter.role == "admin" %}selected{% endif %}>Admin</option> <!-- added -->
                            </select>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 mt-2">UPDATE</button>
                    </form>
                     
                </div>
            </div>
        </div>
    </div>

</body>
</html>
