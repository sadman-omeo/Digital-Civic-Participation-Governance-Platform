<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Complaint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 col-lg-7 mx-auto">
            <div class="card-body p-4">
                <h2 class="mb-4">Manage Complaint</h2>

                <div class="mb-3">
                    <label class="form-label">Voter Name</label>
                    <input type="text" class="form-control" value="{{ complaint.voter_name }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Voter Email</label>
                    <input type="text" class="form-control" value="{{ complaint.voter_email }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" value="{{ complaint.subject }}" disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">Complaint Message</label>
                    <textarea class="form-control" rows="4" disabled>{{ complaint.message }}</textarea>
                </div>

                <form action="/complaints/update/{{ complaint.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select" required>
                            <option value="Pending" {% if complaint.status == "Pending" %}selected{% endif %}>Pending</option>
                            <option value="In Review" {% if complaint.status == "In Review" %}selected{% endif %}>In Review</option>
                            <option value="Resolved" {% if complaint.status == "Resolved" %}selected{% endif %}>Resolved</option>
                            <option value="Closed" {% if complaint.status == "Closed" %}selected{% endif %}>Closed</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Admin Reply</label>
                        <textarea name="admin_reply" class="form-control" rows="4">{{ complaint.admin_reply }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-success">Update Complaint</button>
                    <a href="/complaints/" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
