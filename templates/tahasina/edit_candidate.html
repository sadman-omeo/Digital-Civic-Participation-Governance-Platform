<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Candidate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 col-lg-6 mx-auto">
            <div class="card-body p-4">
                <h2 class="mb-4">Edit Candidate</h2>

                <form action="/candidates/update/{{ candidate.id }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Candidate Name</label>
                        <input type="text" name="name" class="form-control" value="{{ candidate.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Election Category</label>
                        <input type="text" name="category" class="form-control" value="{{ candidate.category }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ candidate.description }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">New Image</label>
                        <input type="file" name="image" class="form-control">
                    </div>

                    {% if candidate.image %}
                    <div class="mb-3">
                        <p class="mb-2">Current Image:</p>
                        <img src="{{ url_for('static', filename='uploads/' + candidate.image) }}" width="100" height="100" style="object-fit: cover; border-radius: 8px;">
                    </div>
                    {% endif %}

                    <button type="submit" class="btn btn-success">Update Candidate</button>
                    <a href="/candidates" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
