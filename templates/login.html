<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blue Theme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="auth-card">
                    <h2 class="text-center mb-4">Login</h2>
                    <form action="/auth/login" method="POST">
                        <div class="mb-3">
                            <label class="form-label">NID</label>
                            <input type="text" class="form-control" name="nid" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 mt-2">Login</button>
                    </form>
                    <p class="text-center mt-3">
                        Don't have an account? <a href="/auth/signup" class="auth-link">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
