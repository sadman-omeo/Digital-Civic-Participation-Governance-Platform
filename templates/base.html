<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Civic Participation Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>

        body {
            margin: 0;
            background-color: #f5f6fa;
            font-family: Arial, Helvetica, sans-serif;
        }


        /* TOP BLUE HEADER BAR */

        .topbar {
            background-color: #2f55d4;
            color: white;
            padding: 15px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }


        /* SIDEBAR */

        .sidebar {
            position: fixed;
            top: 60px;
            left: 0;

            width: 220px;
            height: 100vh;

            background-color: #4f74d9;

            padding-top: 20px;
        }


        .sidebar a {
            display: block;

            padding: 12px 20px;

            color: white;
            text-decoration: none;

            font-weight: 500;
        }


        .sidebar a:hover {
            background-color: #3c5ec9;
        }


        /* MAIN CONTENT AREA */

        .content {
            margin-left: 220px;
            margin-top: 60px;

            padding: 40px;
        }

    </style>

</head>


<body>

    <!-- TOP HEADER BAR -->

    <div class="topbar">
        Digital Civic Participation and Governance Platform
    </div>



    <!-- SIDEBAR -->

    <div class="sidebar">

        <a href="#">Dashboard</a>

        <a href="#">Election Status</a>

        <a href="#">My Requests</a>

        <a href="#">New Request</a>

        <a href="#">Check Status</a>

        <a href="#">Profile</a>

        <a href="#">Logout</a>

    </div>



    <!-- MAIN PAGE CONTENT -->

    <div class="content">

        {% block content %}
        {% endblock %}

    </div>


</body>

</html>
